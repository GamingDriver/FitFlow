<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>
    <link rel="stylesheet" href="/static/css/style.css" />
    <style>
      .container {
        max-width: 800px;
        margin: 50px auto;
        padding: 20px;
        text-align: center;
      }
      h1 {
        color: #333;
      }
      .welcome-message {
        font-size: 18px;
        color: #666;
        margin: 20px 0;
      }
      .logout-btn {
        background-color: #dc3545;
        color: white;
        padding: 10px 20px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 16px;
        margin-top: 20px;
      }
      .logout-btn:hover {
        background-color: #c82333;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Welcome to Dashboard! 🎉</h1>
      <p class="welcome-message">You have successfully logged in.</p>
      <form method="POST" action="/logout">
        <button class="logout-btn" type="submit">Logout</button>
      </form>
    </div>
  </body>
</html>
