<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/style.css" />
  </head>
  <body
    class="bg-gradient-to-br from-gray-950 via-purple-950 to-gray-950 min-h-screen flex items-center justify-center p-4"
  >
    <div class="w-full max-w-md">
      <div class="form-container p-10">
        <div class="text-center mb-10">
          <h1 class="text-4xl font-bold text-white mb-3">Welcome Back</h1>
          <p class="text-gray-400 text-sm">Sign in to your account</p>
        </div>

        <form method="POST" action="/login" class="space-y-6">
          <div>
            <label for="email">Email Address</label>
            <input
              type="email"
              id="email"
              name="email"
              required
              class="input-field"
              placeholder="your@email.com"
            />
          </div>

          <div>
            <label for="password">Password</label>
            <input
              type="password"
              id="password"
              name="password"
              required
              class="input-field"
              placeholder="••••••••"
            />
          </div>

          <button type="submit" class="btn btn-primary mt-8">Sign In</button>
        </form>

        <div class="flex items-center my-8">
          <div
            class="flex-1 border-t border-purple-700 border-opacity-40"
          ></div>
          <span class="px-3 text-gray-500 text-xs uppercase tracking-widest"
            >or</span
          >
          <div
            class="flex-1 border-t border-purple-700 border-opacity-40"
          ></div>
        </div>

        <div class="text-center">
          <p class="text-gray-400 text-sm">
            Don't have an account?
            <a href="/signup-page" class="text-emphasis">Create one</a>
          </p>
        </div>
      </div>
    </div>
  </body>
</html>
