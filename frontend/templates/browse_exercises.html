<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercise Catalog - FitFlow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/style.css" />
  </head>
  <body
    class="bg-gradient-to-br from-gray-950 via-purple-950 to-gray-950 min-h-screen flex items-center justify-center p-4"
  >
    <div class="w-full max-w-6xl">
      <div class="form-container p-10">
        <div class="flex flex-col lg:flex-row justify-between items-start gap-6 mb-10">
          <div class="flex-1">
            <h1 class="text-4xl font-bold text-white mb-2">Exercise Catalog</h1>
            <p class="text-gray-400 text-sm max-w-2xl">
              Browse our exercise library and log your personal records for each movement.
            </p>
          </div>
          <div class="flex flex-col sm:flex-row gap-2 w-full lg:w-auto lg:justify-end">
            <a href="/dashboard" class="btn btn-secondary text-center">Dashboard</a>
            <a href="/workouts" class="btn btn-primary text-center">My Workouts</a>
            <a href="/build-workout" class="btn btn-secondary text-center">Build Workout</a>
            <a href="/profile" class="btn btn-secondary text-center">Profile</a>
          </div>
        </div>

        <div class="grid gap-6">
          {% for exercise in exercises %}
          <div class="dashboard-card">
            <div class="flex flex-col md:flex-row justify-between items-start gap-4">
              <div class="flex-1">
                <h2 class="card-title">{{ exercise.name }}</h2>
                <p class="card-copy mb-3">{{ exercise.description }}</p>
                <div class="flex flex-wrap gap-3">
                  <span class="text-xs bg-purple-900 bg-opacity-50 text-purple-200 px-3 py-1 rounded">
                    {{ exercise.target_muscle }}
                  </span>
                  <span class="text-xs bg-blue-900 bg-opacity-50 text-blue-200 px-3 py-1 rounded capitalize">
                    {{ exercise.difficulty }}
                  </span>
                </div>
              </div>
            </div>

            <form method="POST" action="/record-exercise" class="mt-6 space-y-3">
              <input type="hidden" name="exercise_id" value="{{ exercise.id }}" />

              <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                <div>
                  <label for="weight_{{ exercise.id }}" class="text-xs font-semibold text-gray-300">Weight (kg)</label>
                  <input
                    type="number"
                    id="weight_{{ exercise.id }}"
                    name="weight_kg"
                    step="0.5"
                    required
                    class="input-field"
                    placeholder="0"
                  />
                </div>
                <div>
                  <label for="reps_{{ exercise.id }}" class="text-xs font-semibold text-gray-300">Reps</label>
                  <input
                    type="number"
                    id="reps_{{ exercise.id }}"
                    name="reps"
                    required
                    class="input-field"
                    placeholder="10"
                  />
                </div>
                <div>
                  <label for="sets_{{ exercise.id }}" class="text-xs font-semibold text-gray-300">Sets</label>
                  <input
                    type="number"
                    id="sets_{{ exercise.id }}"
                    name="sets"
                    required
                    class="input-field"
                    placeholder="3"
                  />
                </div>
                <div>
                  <label for="notes_{{ exercise.id }}" class="text-xs font-semibold text-gray-300">Notes</label>
                  <input
                    type="text"
                    id="notes_{{ exercise.id }}"
                    name="notes"
                    class="input-field"
                    placeholder="Optional"
                  />
                </div>
              </div>

              <button type="submit" class="btn btn-primary w-full">Log Exercise</button>
            </form>
          </div>
          {% endfor %}
        </div>
      </div>
    </div>
  </body>
</html>
