<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Workout - FitFlow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/style.css" />
  </head>
  <body
    class="bg-gradient-to-br from-gray-950 via-purple-950 to-gray-950 min-h-screen flex items-center justify-center p-4"
  >
    <div class="w-full max-w-md">
      <div class="form-container p-10">
        <div class="text-center mb-10">
          <h1 class="text-4xl font-bold text-white mb-3">Create Workout</h1>
          <p class="text-gray-400 text-sm">Build a routine from our exercise catalog.</p>
        </div>

        <div class="space-y-4">
          <a href="/build-workout" class="btn btn-primary w-full block text-center">
            Build Workout from Catalog
          </a>
          
          <div class="flex items-center gap-4 my-6">
            <div class="flex-1 border-t border-purple-700 border-opacity-40"></div>
            <span class="px-3 text-gray-500 text-xs uppercase tracking-widest">or</span>
            <div class="flex-1 border-t border-purple-700 border-opacity-40"></div>
          </div>

          <form method="POST" action="/create-workout" class="space-y-6">
            <div>
              <label for="title">Workout Title</label>
              <input
                type="text"
                id="title"
                name="title"
                required
                value="{{ title }}"
                class="input-field"
                placeholder="Full body strength"
              />
            </div>

            <div>
              <label for="description">Description</label>
              <input
                type="text"
                id="description"
                name="description"
                value="{{ description }}"
                class="input-field"
                placeholder="A quick session for strength and endurance"
              />
            </div>

            <div>
              <label for="exercises">Exercises</label>
              <textarea
                id="exercises"
                name="exercises"
                required
                class="input-field min-h-[160px]"
                placeholder="Push-ups &#10;Squats &#10;Plank"
              >{{ exercises }}</textarea>
            </div>

            {% if error %}
            <div class="rounded-lg border border-red-500 bg-red-500/15 text-red-200 px-4 py-3 text-sm font-medium">
              {{ error }}
            </div>
            {% endif %}

            <button type="submit" class="btn btn-secondary w-full">Manual Entry</button>
          </form>
        </div>

        <div class="text-center mt-8">
          <a href="/workouts" class="text-emphasis">Back to workouts</a>
        </div>
      </div>
    </div>
  </body>
</html>
