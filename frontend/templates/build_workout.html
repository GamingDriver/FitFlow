<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Build Workout - FitFlow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/style.css" />
  </head>
  <body
    class="bg-gradient-to-br from-gray-950 via-purple-950 to-gray-950 min-h-screen p-4"
  >
    <div class="w-full max-w-4xl mx-auto">
      <div class="form-container p-10">
        <div class="text-center mb-10">
          <h1 class="text-4xl font-bold text-white mb-3">Build Your Workout</h1>
          <p class="text-gray-400 text-sm">Select exercises from our catalog and create your perfect routine.</p>
        </div>

        <form method="POST" action="/build-workout" class="space-y-6">
          <div>
            <label for="title">Workout Title</label>
            <input
              type="text"
              id="title"
              name="title"
              required
              value="{{ title }}"
              class="input-field"
              placeholder="Full body strength"
            />
          </div>

          <div>
            <label for="description">Description</label>
            <input
              type="text"
              id="description"
              name="description"
              value="{{ description }}"
              class="input-field"
              placeholder="A quick session for strength and endurance"
            />
          </div>

          <div>
            <label>Select Exercises</label>
            <div class="grid gap-3 max-h-96 overflow-y-auto border border-purple-700 border-opacity-40 rounded-lg p-4 bg-gray-900 bg-opacity-50">
              {% for exercise in exercises %}
              <div class="flex items-start gap-3 p-3 bg-gray-800 bg-opacity-40 rounded border border-purple-600 border-opacity-30 hover:border-opacity-60 transition">
                <input
                  type="checkbox"
                  id="exercise_{{ exercise.id }}"
                  name="exercise_checkbox"
                  value="{{ exercise.id }}"
                  class="w-5 h-5 rounded border-purple-500 mt-1 cursor-pointer"
                />
                <label for="exercise_{{ exercise.id }}" class="flex-1 cursor-pointer">
                  <div class="font-semibold text-white">{{ exercise.name }}</div>
                  <div class="text-gray-400 text-sm">{{ exercise.description }}</div>
                  <div class="text-purple-300 text-xs mt-1">
                    <span class="mr-3">{{ exercise.target_muscle }}</span>
                    <span class="capitalize">{{ exercise.difficulty }}</span>
                  </div>
                </label>
              </div>
              {% endfor %}
            </div>
          </div>

          <input type="hidden" name="exercise_ids" id="exercise_ids_hidden" value="" />

          {% if error %}
          <div class="rounded-lg border border-red-500 bg-red-500/15 text-red-200 px-4 py-3 text-sm font-medium">
            {{ error }}
          </div>
          {% endif %}

          <div class="flex gap-3">
            <button type="submit" class="btn btn-primary flex-1">Create Workout</button>
            <a href="/workouts" class="btn btn-secondary flex-1 text-center">Cancel</a>
          </div>
        </form>
      </div>
    </div>

    <script>
      document.querySelector('form').addEventListener('submit', function(e) {
        const checkboxes = document.querySelectorAll('input[name="exercise_checkbox"]:checked');
        const ids = Array.from(checkboxes).map(cb => cb.value).join(',');
        document.getElementById('exercise_ids_hidden').value = ids;
      });
    </script>
  </body>
</html>
