<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/style.css" />
  </head>
  <body
    class="bg-gradient-to-br from-gray-950 via-purple-950 to-gray-950 min-h-screen flex items-center justify-center p-4"
  >
    <div class="w-full max-w-md">
      <div class="form-container p-10">
        <div class="text-center mb-10">
          <h1 class="text-4xl font-bold text-white mb-3">Get Started</h1>
          <p class="text-gray-400 text-sm">Create your account now</p>
        </div>

        <form method="POST" action="/signup" class="space-y-5">
          <div>
            <label for="fullname">Full Name</label>
            <input
              type="text"
              id="fullname"
              name="fullname"
              required
              class="input-field"
              placeholder="John Doe"
            />
          </div>

          <div>
            <label for="email">Email Address</label>
            <input
              type="email"
              id="email"
              name="email"
              required
              class="input-field"
              placeholder="your@email.com"
            />
          </div>

          <div>
            <label for="password">Password</label>
            <input
              type="password"
              id="password"
              name="password"
              required
              class="input-field"
              placeholder="••••••••"
            />
          </div>

          <div>
            <label for="confirm_password">Confirm Password</label>
            <input
              type="password"
              id="confirm_password"
              name="confirm_password"
              required
              class="input-field"
              placeholder="••••••••"
            />
          </div>

          <button type="submit" class="btn btn-primary mt-8">
            Create Account
          </button>
        </form>

        <div class="flex items-center my-8">
          <div
            class="flex-1 border-t border-purple-700 border-opacity-40"
          ></div>
          <span class="px-3 text-gray-500 text-xs uppercase tracking-widest"
            >or</span
          >
          <div
            class="flex-1 border-t border-purple-700 border-opacity-40"
          ></div>
        </div>

        <div class="text-center">
          <p class="text-gray-400 text-sm">
            Already have an account?
            <a href="/login-page" class="text-emphasis">Sign in</a>
          </p>
        </div>
      </div>
    </div>
  </body>
</html>
